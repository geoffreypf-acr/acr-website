<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>CRM — ACR Automobile (Private)</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="site.css">
<style>
  body { margin: 0; }
  .crm-shell { padding: 20px 22px 60px; max-width: 1600px; margin: 0 auto; }
  .crm-head { display: flex; align-items: center; gap: 16px; padding: 14px 0 18px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 20px; flex-wrap: wrap; }
  .crm-head img { height: 24px; }
  .crm-head h1 { font-family: var(--font-display); font-weight: 400; font-size: 26px; letter-spacing: .02em; margin: 0; }
  .crm-head .spacer { flex: 1; }
  .crm-search { height: 42px; padding: 0 14px; min-width: 220px; background: var(--surface-inset); border: 1px solid var(--border-default); border-radius: var(--radius-md); color: var(--text-primary); font-family: var(--font-body); font-size: 14.5px; }
  .crm-search:focus { outline: none; border-color: var(--signal-500); box-shadow: 0 0 0 3px var(--accent-soft); }
  .crm-btn { height: 42px; padding: 0 16px; border-radius: var(--radius-md); border: 1px solid var(--border-strong); background: transparent; color: var(--text-primary); font-family: var(--font-body); font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
  .crm-btn:hover { border-color: var(--signal-500); background: var(--accent-soft); }
  .crm-btn.primary { background: var(--silver-fill); color: var(--silver-ink); border-color: transparent; }
  .pill { display: inline-flex; align-items: center; gap: 7px; height: 42px; padding: 0 14px; border-radius: 999px; background: var(--alert-soft); border: 1px solid rgba(224,105,91,.3); color: var(--alert-400); font-size: 13px; font-weight: 600; }
  .pill.zero { background: var(--surface-inset); border-color: var(--border-default); color: var(--text-muted); }

  .board { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(258px, 1fr); gap: 14px; overflow-x: auto; padding-bottom: 12px; align-items: start; }
  .col { background: var(--surface-1); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); display: flex; flex-direction: column; min-height: 120px; }
  .col.drop { border-color: var(--signal-500); box-shadow: 0 0 0 1px var(--signal-500); }
  .col-h { display: flex; align-items: center; gap: 9px; padding: 14px 15px 10px; }
  .col-dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .col-h .nm { font-family: var(--font-display); font-weight: 400; font-size: 16px; letter-spacing: .02em; }
  .col-h .ct { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .col-h .sum { font-family: var(--font-mono); font-size: 11px; color: var(--signal-300); }
  .col-body { padding: 4px 10px 12px; display: flex; flex-direction: column; gap: 9px; min-height: 40px; }

  .card { background: var(--surface-card); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 12px 13px; cursor: pointer; transition: border-color .15s, transform .05s; }
  .card:hover { border-color: var(--border-strong); }
  .card:active { transform: scale(.99); }
  .card.overdue { border-left: 3px solid var(--alert-400); }
  .card .nm { font-weight: 600; font-size: 14px; color: var(--text-primary); }
  .card .meta { font-size: 12px; color: var(--text-secondary); margin-top: 3px; line-height: 1.4; }
  .card .row2 { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .chip { font-family: var(--font-mono); font-size: 10.5px; padding: 3px 7px; border-radius: 6px; background: var(--surface-inset); color: var(--text-muted); border: 1px solid var(--border-subtle); }
  .chip.val { color: var(--signal-300); border-color: rgba(47,161,204,.3); }
  .chip.fu { color: var(--warn-400); border-color: rgba(223,174,78,.3); }
  .chip.fu.late { color: var(--alert-400); border-color: rgba(224,105,91,.35); background: var(--alert-soft); }
  .empty-col { color: var(--text-muted); font-size: 12px; font-style: italic; padding: 10px 4px; text-align: center; }

  /* Drawer */
  .drawer-bg { position: fixed; inset: 0; background: rgba(6,15,22,.55); z-index: 80; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .drawer-bg.open { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 0; right: 0; height: 100%; width: 420px; max-width: 92vw; background: var(--surface-1); border-left: 1px solid var(--border-default); z-index: 81; transform: translateX(100%); transition: transform .22s var(--ease-out, ease); display: flex; flex-direction: column; }
  .drawer.open { transform: none; }
  .drawer-h { display: flex; align-items: flex-start; gap: 12px; padding: 20px 20px 16px; border-bottom: 1px solid var(--border-subtle); }
  .drawer-h .nm { font-family: var(--font-display); font-weight: 400; font-size: 22px; letter-spacing: .02em; }
  .drawer-h .sub { font-size: 12.5px; color: var(--text-muted); margin-top: 3px; }
  .drawer-h .x { margin-left: auto; background: transparent; border: none; color: var(--text-muted); font-size: 24px; line-height: 1; cursor: pointer; padding: 2px 6px; border-radius: 7px; }
  .drawer-h .x:hover { color: var(--text-primary); background: var(--surface-inset); }
  .drawer-body { padding: 18px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
  .dfield { display: flex; flex-direction: column; gap: 7px; }
  .dfield label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; }
  .dfield input, .dfield select, .dfield textarea { height: 46px; padding: 0 13px; background: var(--surface-inset); border: 1px solid var(--border-default); border-radius: var(--radius-md); color: var(--text-primary); font-family: var(--font-body); font-size: 15px; width: 100%; }
  .dfield textarea { height: auto; min-height: 90px; padding: 11px 13px; line-height: 1.5; resize: vertical; }
  .fu-quick { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 2px; }
  .fu-quick button { flex: 1; min-width: 68px; height: 36px; border-radius: var(--radius-md); border: 1px solid var(--border-default); background: var(--surface-inset); color: var(--text-secondary); font-family: var(--font-body); font-size: 12.5px; font-weight: 600; cursor: pointer; }
  .fu-quick button:hover { border-color: var(--signal-500); color: var(--text-primary); background: var(--accent-soft); }
  .fu-quick button.clr { flex: none; min-width: 0; padding: 0 12px; color: var(--text-muted); }
  .fu-quick button.clr:hover { color: var(--alert-400); border-color: rgba(224,105,91,.35); background: var(--alert-soft); }
  /* Follow-up attempt colours: 1 green · 2 yellow · 3 red */
  .fnum-seg { display: flex; gap: 7px; }
  .fnum-seg button { flex: 1; height: 40px; border-radius: var(--radius-md); border: 1px solid var(--border-default); background: var(--surface-inset); color: var(--text-secondary); font-family: var(--font-body); font-size: 13px; font-weight: 700; cursor: pointer; }
  .fnum-seg button:hover { border-color: var(--border-strong); }
  .fnum-seg button.sel[data-n="0"] { background: var(--surface-hover); color: var(--text-primary); border-color: var(--border-strong); }
  .fnum-seg button.sel.n1 { background: rgba(31,138,91,.18); color: #4FCB8B; border-color: #1F8A5B; }
  .fnum-seg button.sel.n2 { background: var(--warn-soft); color: var(--warn-400); border-color: var(--warn-400); }
  .fnum-seg button.sel.n3 { background: var(--alert-soft); color: var(--alert-400); border-color: var(--alert-400); }
  .chip.fnum { font-weight: 700; }
  .chip.fnum.n1 { color: #4FCB8B; border-color: rgba(31,138,91,.45); background: rgba(31,138,91,.12); }
  .chip.fnum.n2 { color: var(--warn-400); border-color: rgba(223,174,78,.45); background: var(--warn-soft); }
  .chip.fnum.n3 { color: var(--alert-400); border-color: rgba(224,105,91,.5); background: var(--alert-soft); }
  .chip.pref { color: var(--secure-400); border-color: rgba(87,187,223,.4); background: rgba(87,187,223,.1); }
  .crm-btn.del { flex: none; border-color: rgba(224,105,91,.35); color: var(--alert-400); }
  .crm-btn.del:hover { background: var(--alert-soft); border-color: var(--alert-400); }
  /* Contact action buttons (Call / Message / WhatsApp) */
  .dactions { display: flex; gap: 8px; flex-wrap: wrap; }
  .dactions a { flex: 1; min-width: 92px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; height: 44px; border-radius: var(--radius-md); border: 1px solid var(--border-default); background: var(--surface-inset); color: var(--text-primary); font-family: var(--font-body); font-size: 13.5px; font-weight: 600; text-decoration: none; }
  .dactions a:hover { border-color: var(--signal-500); background: var(--accent-soft); }
  .dactions a svg { width: 16px; height: 16px; }
  .dactions a.wa { color: #25D366; border-color: rgba(37,211,102,.4); }
  .dactions a.wa:hover { background: rgba(37,211,102,.12); }
  /* Undo toast */
  .toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px); background: var(--surface-raised); border: 1px solid var(--border-strong); border-radius: var(--radius-md); padding: 12px 14px 12px 18px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow-lg, 0 10px 40px rgba(0,0,0,.4)); z-index: 120; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; }
  .toast.show { opacity: 1; transform: translateX(-50%); pointer-events: auto; }
  .toast .msg { font-size: 14px; color: var(--text-primary); }
  .toast button { background: transparent; border: none; color: var(--signal-300); font-weight: 700; font-size: 14px; cursor: pointer; padding: 6px 10px; border-radius: 7px; }
  .toast button:hover { background: var(--accent-soft); }
  .dfield input:focus, .dfield select:focus, .dfield textarea:focus { outline: none; border-color: var(--signal-500); box-shadow: 0 0 0 3px var(--accent-soft); }
  .dinfo { background: var(--surface-inset); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 12px 14px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .dinfo b { color: var(--text-primary); }
  .dinfo a { color: var(--signal-300); }
  .drawer-foot { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border-subtle); display: flex; gap: 10px; }
  .drawer-foot .crm-btn { flex: 1; height: 48px; justify-content: center; }

  .banner { display: none; background: var(--warn-soft); border: 1px solid rgba(223,174,78,.3); color: var(--text-secondary); border-radius: var(--radius-md); padding: 12px 15px; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
  .banner b { color: var(--warn-400); }
  .banner a { color: var(--signal-300); }

  @media (max-width: 720px) {
    .crm-shell { padding: 14px 12px 50px; }
    .board { grid-auto-flow: row; grid-auto-columns: auto; }
    .crm-head h1 { font-size: 22px; }
    .crm-search { flex: 1; min-width: 0; }
  }
  /* Gate */
  #gate { position: fixed; inset: 0; z-index: 9999; background: var(--bg-base); display: grid; place-items: center; padding: 22px; }
  #gate .box { width: 100%; max-width: 340px; text-align: center; }
  #gate img { height: 28px; margin: 0 0 24px; }
  #gate h2 { font-family: var(--font-display); font-weight: 400; font-size: 24px; margin: 0 0 6px; }
  #gate p { color: var(--text-muted); font-size: 13px; margin: 0 0 20px; }
  #gate input { height: 50px; width: 100%; text-align: center; letter-spacing: .3em; font-size: 17px; background: var(--surface-inset); border: 1px solid var(--border-default); border-radius: var(--radius-md); color: var(--text-primary); font-family: var(--font-mono); }
  #gate input:focus { outline: none; border-color: var(--signal-500); box-shadow: 0 0 0 3px var(--accent-soft); }
  #gate button { margin-top: 14px; height: 48px; width: 100%; border: none; border-radius: var(--radius-md); background: var(--silver-fill); color: var(--silver-ink); font-family: var(--font-body); font-weight: 600; font-size: 15px; cursor: pointer; }
  #gate .err { color: var(--alert-400); font-size: 13px; min-height: 18px; margin-top: 12px; }
  body.locked { overflow: hidden; }
</style>
</head>
<body class="locked">
<div id="gate">
  <div class="box">
    <img src="assets/logo-silver.png" alt="ACR Automobile" onerror="this.style.display='none'">
    <h2>ACR CRM</h2>
    <p>Enter your passcode to continue.</p>
    <input id="gateCode" type="password" inputmode="numeric" autocomplete="off" placeholder="• • • •" autofocus>
    <button id="gateBtn">Unlock</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>
<script>
(function(){
  var PASS_HASH = 'a1fb4e703a9ef1fa4936801721ff285a97ac85330856674412e054892afe6972'; /* current: 2468 */
  var KEY = 'acr_bk_auth';
  var gate = document.getElementById('gate');
  function unlock(){ gate.style.display='none'; document.body.classList.remove('locked'); if(window.__crmStart) window.__crmStart(); }
  async function sha(s){ var b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return [].map.call(new Uint8Array(b), function(x){return x.toString(16).padStart(2,'0');}).join(''); }
  if (sessionStorage.getItem(KEY) === PASS_HASH) { unlock(); }
  async function tryCode(){ var v=document.getElementById('gateCode').value.trim(); var h=await sha(v); if(h===PASS_HASH){ sessionStorage.setItem(KEY,h); unlock(); } else { document.getElementById('gateErr').textContent='Incorrect passcode.'; document.getElementById('gateCode').value=''; } }
  document.getElementById('gateBtn').addEventListener('click', tryCode);
  document.getElementById('gateCode').addEventListener('keydown', function(e){ if(e.key==='Enter') tryCode(); });
})();
</script>

<div class="crm-shell">
  <div class="crm-head">
    <img src="assets/logo-silver.png" alt="ACR Automobile" onerror="this.style.display='none'">
    <h1>Pipeline</h1>
    <div class="spacer"></div>
    <input class="crm-search" id="search" placeholder="Search name, vehicle, service…">
    <span class="pill zero" id="fuPill">0 follow-ups due</span>
    <button class="crm-btn" id="refresh">Refresh</button>
    <a class="crm-btn primary" href="booking-console-a7c93f.html">Booking console →</a>

  <div class="banner" id="banner"></div>

<!-- Drawer -->
<div class="drawer-bg" id="drawerBg"></div>
<div class="drawer" id="drawer">
  <div class="drawer-h">
    <div><div class="nm" id="dName">—</div><div class="sub" id="dSub"></div></div>
    <button class="x" id="dClose">&times;</button>
  </div>
  <div class="drawer-body">
    <div class="dinfo" id="dInfo"></div>

</div>

<div class="toast" id="toast"><span class="msg" id="toastMsg"></span><button id="toastUndo">Undo</button></div>

<script>
window.__crmStart = function(){
  var SHEET_ENDPOINT = 'https://script.google.com/macros/s/AKfycbywkNnoW4Nn5injAeEHZszQZFjwdGxxOJJI1DHmb4Fgud3HUZJfYPQZAsRIdsnwtzsWDw/exec';
  var STAGES = [
    { key:'New',       color:'#8FD6EE' },
    { key:'Contacted', color:'#B3BCC2' },
    { key:'Quoted',    color:'#DFAE4E' },
    { key:'Booked',    color:'#57BBDF' },
    { key:'Completed', color:'#1F8A5B' },
    { key:'Lost',      color:'#E0695B' }
  ];
  var $ = function(id){ return document.getElementById(id); };
  var data = [];          // all enquiries
  var current = null;     // enquiry open in drawer
  var dragKey = null;

  // seed status dropdown
  STAGES.forEach(function(s){ var o=document.createElement('option'); o.value=s.key; o.textContent=s.key; $('dStatus').appendChild(o); });

  function esc(t){ var d=document.createElement('div'); d.textContent=t==null?'':t; return d.innerHTML; }
  function statusOf(e){ var s=(e.status||'').toString().trim(); return STAGES.some(function(x){return x.key===s;}) ? s : 'New'; }
  function valNum(e){ var v=parseFloat(String(e.value||'').replace(/[^0-9.]/g,'')); return isNaN(v)?0:v; }
  function today(){ var d=new Date(); d.setHours(0,0,0,0); return d; }
  function fuDate(e){ if(!e.followup) return null; var d=new Date(e.followup); return isNaN(d)?null:d; }
  function isOverdue(e){ var d=fuDate(e); if(!d) return false; var st=statusOf(e); if(st==='Completed'||st==='Lost') return false; return d<=today(); }
  function vehicle(e){ return [e.make,e.model].filter(Boolean).join(' '); }
  function serviceOf(e){ return e.service||e.interested||e.interestedIn||''; }
  function prefContact(e){ return (e.preferredReply||e.preferredreply||e.preferred||'').toString().trim(); }
  function isDeleted(e){ var v=(e.deleted||'').toString().toLowerCase(); return v==='true'||v==='1'||v==='yes'; }
  function fnum(e){ var n=parseInt(e.followups,10); return (n>=1&&n<=3)?n:0; }
  function ukPhone(raw){
    var p=(raw||'').toString().replace(/[^\d+]/g,''); if(!p) return '';
    var nat;
    if(p.charAt(0)==='+'){ if(p.indexOf('+44')===0) nat=p.slice(3); else return p; }
    else if(p.slice(0,2)==='44') nat=p.slice(2);
    else if(p.charAt(0)==='0') nat=p.slice(1);
    else nat=p;
    nat=nat.replace(/\D/g,''); if(!nat) return '+44';
    var g = nat.length===10 ? nat.slice(0,4)+' '+nat.slice(4) : nat;
    return '+44 '+g;
  }
  function money(n){ return '£'+n.toLocaleString('en-GB'); }
  function fmtD(d){ return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}); }

  function render(){
    var q = ($('search').value||'').toLowerCase().trim();
    var board = $('board'); board.innerHTML='';
    var due = 0;
    STAGES.forEach(function(s){
      var items = data.filter(function(e){ return !isDeleted(e) && statusOf(e)===s.key; })
        .filter(function(e){ if(!q) return true; return (e.name+' '+vehicle(e)+' '+serviceOf(e)+' '+(e.email||'')).toLowerCase().indexOf(q)>-1; })
        .sort(function(a,b){ return new Date(b.timestamp||0)-new Date(a.timestamp||0); });
      var sum = items.reduce(function(t,e){ return t+valNum(e); },0);
      var col = document.createElement('div'); col.className='col'; col.dataset.stage=s.key;
      col.innerHTML = '<div class="col-h"><span class="col-dot" style="background:'+s.color+'"></span>'
        + '<span class="nm">'+s.key+'</span><span class="ct">'+items.length+'</span></div>'
        + (sum? '<div class="col-h" style="padding-top:0"><span class="sum" style="margin-left:18px">'+money(sum)+'</span></div>' : '')
        + '<div class="col-body"></div>';
      var body = col.querySelector('.col-body');
      if(!items.length){ body.innerHTML='<div class="empty-col">—</div>'; }
      items.forEach(function(e){
        if(isOverdue(e)) due++;
        var card=document.createElement('div'); card.className='card'+(isOverdue(e)?' overdue':'');
        card.draggable=true; card.dataset.key=e.timestamp;
        var chips=[];
        var fn=fnum(e); if(fn) chips.push('<span class="chip fnum n'+fn+'">Follow-up '+fn+'</span>');
        if(valNum(e)) chips.push('<span class="chip val">'+money(valNum(e))+'</span>');
        var d=fuDate(e); if(d) chips.push('<span class="chip fu'+(isOverdue(e)?' late':'')+'">◔ '+fmtD(d)+'</span>');
        if(e.source) chips.push('<span class="chip">'+esc(String(e.source).replace('.html',''))+'</span>');
        var pc=prefContact(e); if(pc) chips.push('<span class="chip pref">'+esc(pc)+'</span>');
        card.innerHTML='<div class="nm">'+esc(e.name||'—')+'</div>'
          +'<div class="meta">'+esc([serviceOf(e),vehicle(e)].filter(Boolean).join(' · ')||'—')+'</div>'
          +(chips.length?'<div class="row2">'+chips.join('')+'</div>':'');
        card.addEventListener('click', function(){ openDrawer(e); });
        card.addEventListener('dragstart', function(ev){ dragKey=e.timestamp; ev.dataTransfer.effectAllowed='move'; });
        body.appendChild(card);
      });
      col.addEventListener('dragover', function(ev){ ev.preventDefault(); col.classList.add('drop'); });
      col.addEventListener('dragleave', function(){ col.classList.remove('drop'); });
      col.addEventListener('drop', function(ev){ ev.preventDefault(); col.classList.remove('drop'); if(dragKey){ setStatus(dragKey, s.key); dragKey=null; } });
      board.appendChild(col);
    });
    var pill=$('fuPill'); pill.textContent = due+' follow-up'+(due===1?'':'s')+' due'; pill.className='pill'+(due?'':' zero');
  }

  function find(key){ return data.filter(function(e){ return String(e.timestamp)===String(key); })[0]; }

  function setStatus(key, status){
    var e=find(key); if(!e) return; e.status=status; render();
    save(key, { status: status });
  }

  // Optimistic write-back (no-cors, can't read response)
  function save(key, fields){
    if(!SHEET_ENDPOINT) return;
    try{ fetch(SHEET_ENDPOINT, {method:'POST', mode:'no-cors', keepalive:true, headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({action:'updateEnquiry', key:key, fields:fields})}).catch(function(){}); }catch(e){}
  }

  // Drawer
  function openDrawer(e){
    current=e;
    $('dName').textContent = e.name||'—';
    $('dSub').textContent = [serviceOf(e), vehicle(e)].filter(Boolean).join(' · ');
    var info=[];
    if(e.email) info.push('<b>Email:</b> <a href="mailto:'+esc(e.email)+'">'+esc(e.email)+'</a>');
    if(e.mobile) info.push('<b>Mobile:</b> '+esc(ukPhone(e.mobile)));
    if(e.postcode) info.push('<b>Postcode:</b> '+esc(e.postcode));
    var pc=prefContact(e); if(pc) info.push('<b>Prefers:</b> '+esc(pc));
    if(e.registration) info.push('<b>Reg:</b> '+esc(e.registration));
    if(e.timestamp){ var d=new Date(e.timestamp); if(!isNaN(d)) info.push('<b>Enquired:</b> '+d.toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})); }
    $('dInfo').innerHTML = info.join('<br>') || 'No contact details captured.';
    // Contact action buttons — tap to Call / Message (iMessage/SMS) / WhatsApp
    var act = $('dActions');
    if(e.mobile){
      var digits = ukPhone(e.mobile).replace(/\D/g,''); // e.g. 447700900123
      act.style.display='flex';
      act.innerHTML =
        '<a href="tel:+'+digits+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2 4.2 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L8 9.6a16 16 0 0 0 6 6l1.2-1.1a2 2 0 0 1 2.1-.5c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 2z"/></svg>Call</a>'
      + '<a href="sms:+'+digits+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Message</a>'
      + '<a class="wa" href="https://wa.me/'+digits+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.15-1.7-.84-2-.94-.26-.1-.46-.15-.65.15-.2.29-.74.94-.9 1.13-.17.2-.34.22-.63.08-.3-.15-1.25-.46-2.38-1.47-.88-.79-1.47-1.76-1.64-2.05-.17-.3-.02-.46.13-.6.13-.14.3-.34.44-.51.15-.17.2-.29.3-.49.1-.2.05-.37-.02-.51-.08-.15-.65-1.57-.9-2.15-.24-.56-.48-.48-.65-.49h-.56c-.2 0-.5.07-.77.36-.26.29-1 1-1 2.42 0 1.43 1.03 2.8 1.17 3 .14.2 2.03 3.1 4.92 4.35.69.3 1.22.47 1.64.6.69.22 1.31.19 1.8.12.55-.08 1.7-.7 1.94-1.36.24-.67.24-1.24.17-1.36-.07-.12-.26-.2-.55-.34zM12 2a10 10 0 0 0-8.5 15.3L2 22l4.8-1.5A10 10 0 1 0 12 2z"/></svg>WhatsApp</a>';
    } else { act.style.display='none'; act.innerHTML=''; }
    $('dStatus').value = statusOf(e);
    $('dValue').value = e.value||'';
    $('dFollowup').value = e.followup ? String(e.followup).slice(0,10) : '';
    $('dOwner').value = e.owner||'';
    $('dNotes').value = e.notes||'';
    setFnumUI(fnum(e));
    // Book link → prefill booking console
    var p = new URLSearchParams({ name:e.name||'', email:e.email||'', phone:e.mobile||'', make:e.make||'', model:e.model||'', service:serviceOf(e) });
    $('dBook').href = 'booking-console-a7c93f.html#'+p.toString();
    $('drawer').classList.add('open'); $('drawerBg').classList.add('open');
  }
  function closeDrawer(){ $('drawer').classList.remove('open'); $('drawerBg').classList.remove('open'); current=null; }
  $('dClose').addEventListener('click', closeDrawer);
  $('drawerBg').addEventListener('click', closeDrawer);

  // Follow-up attempt segmented control (0 = none)
  var fnumVal = 0;
  function setFnumUI(n){
    fnumVal = n||0;
    [].forEach.call($('fnumSeg').querySelectorAll('button'), function(b){ b.classList.toggle('sel', parseInt(b.dataset.n,10)===fnumVal); });
  }
  $('fnumSeg').addEventListener('click', function(ev){ var b=ev.target.closest('button'); if(!b) return; setFnumUI(parseInt(b.dataset.n,10)); });
  // Follow-up quick-set buttons
  $('fuQuick').addEventListener('click', function(ev){
    var b=ev.target.closest('button'); if(!b) return;
    var days=parseInt(b.dataset.days,10);
    if(b.classList.contains('clr')){ $('dFollowup').value=''; return; }
    var d=new Date(); d.setDate(d.getDate()+days); $('dFollowup').value=d.toISOString().slice(0,10);
  });
  $('dSave').addEventListener('click', function(){
    if(!current) return;
    current.status=$('dStatus').value; current.value=$('dValue').value; current.followup=$('dFollowup').value; current.owner=$('dOwner').value; current.notes=$('dNotes').value; current.followups=fnumVal||'';
    save(current.timestamp, { status:current.status, value:current.value, followup:current.followup, owner:current.owner, notes:current.notes, followups:current.followups });
    render(); this.textContent='Saved ✓'; var self=this; setTimeout(function(){ self.textContent='Save'; }, 1300);
  });

  // Delete (soft) + undo
  var undoTimer=null;
  function showToast(msg, onUndo){
    $('toastMsg').textContent=msg; $('toast').classList.add('show');
    clearTimeout(undoTimer); undoTimer=setTimeout(function(){ $('toast').classList.remove('show'); }, 6000);
    $('toastUndo').onclick=function(){ clearTimeout(undoTimer); $('toast').classList.remove('show'); onUndo(); };
  }
  $('dDelete').addEventListener('click', function(){
    if(!current) return;
    var e=current, nm=e.name||'Lead';
    e.deleted='TRUE'; save(e.timestamp, { deleted:'TRUE' });
    closeDrawer(); render();
    showToast(nm+' deleted', function(){ e.deleted=''; save(e.timestamp, { deleted:'' }); render(); });
  });

  function load(){
    $('refresh').textContent='Loading…';
    fetch(SHEET_ENDPOINT, {method:'GET'}).then(function(r){ return r.json(); })
      .then(function(rows){ data = Array.isArray(rows)?rows:(rows.enquiries||[]); data=data.filter(function(e){ return e.timestamp || e.name || e.email; }); $('banner').style.display='none'; render(); })
      .catch(function(){ $('banner').style.display='block'; $('banner').innerHTML='<b>Couldn\u2019t load the sheet.</b> Check the web-app URL is deployed to \u201cAnyone\u201d.'; })
      .then(function(){ $('refresh').textContent='Refresh'; });
  }
  $('refresh').addEventListener('click', load);
  $('search').addEventListener('input', render);
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeDrawer(); });

  load();
};
// If the gate was already satisfied this session, the unlock ran before this script defined
// __crmStart — so start it now.
if (!document.body.classList.contains('locked')) window.__crmStart();
</script>
</body>
</html>
